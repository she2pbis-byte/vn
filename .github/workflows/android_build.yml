on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps || true
          npm install -g react-native-cli

      - name: Generate Android Folder
        run: |
          if [ ! -d "android" ]; then
            echo "Generating android folder..."
            npx react-native init TempApp --version 0.72.6 --skip-install
            cp -r TempApp/android .
            rm -rf TempApp
          fi

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          # Используем флаги для обхода мелких ошибок ресурсов
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-release
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
