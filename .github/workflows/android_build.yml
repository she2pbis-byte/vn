on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Create and Build Project
        run: |
          # 1. Устанавливаем CLI
          npm install -g react-native-cli
          
          # 2. Создаем абсолютно новый проект во временной папке
          # Это гарантирует наличие всех файлов: gradlew, манифестов и т.д.
          npx react-native init MyVNProject --version 0.72.6 --skip-install
          
          # 3. Переходим в проект
          cd MyVNProject
          
          # 4. Копируем ваши файлы из корня репозитория (если они есть) в новый проект
          # Мы копируем все, кроме папки .git и самого проекта
          cp -r ../* . || true
          
          # 5. Устанавливаем зависимости внутри нового проекта
          npm install --legacy-peer-deps
          
          # 6. Сборка APK внутри созданного проекта
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint -x test
          
          # 7. Перемещаем готовый APK в корень для загрузки
          mkdir -p ../../output
          cp app/build/outputs/apk/release/*.apk ../../output/ || true
          cp app/build/outputs/apk/debug/*.apk ../../output/ || true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-final
          path: output/*.apk
