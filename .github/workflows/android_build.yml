on:
  push:
    branches: [ "main", "master", "patch-1" ] # Добавил patch-1, так как часто вторая ветка называется так
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Убрали cache: 'npm', чтобы не было ошибки из-за отсутствия lock-файла

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android Release
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          # Путь может отличаться, если в проекте несколько модулей. 
          # Этот путь стандартный для React Native:
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
