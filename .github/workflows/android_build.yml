on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Create Base Project Files
        run: |
          # Создаем package.json если его нет
          if [ ! -f "package.json" ]; then
            echo '{"name":"vn","version":"1.0.0","dependencies":{"react":"18.2.0","react-native":"0.72.6"}}' > package.json
          fi
          
          # Создаем app.json если его нет
          if [ ! -f "app.json" ]; then
            echo '{"name":"vn","displayName":"VN Project"}' > app.json
          fi
          
          # Создаем App.js если его нет
          if [ ! -f "App.js" ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return (<View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>VN App Ready</Text></View>); }" > App.js
          fi
          
          # Создаем index.js если его нет
          if [ ! -f "index.js" ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
          fi

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g react-native-cli

      - name: Generate Android Folder
        run: |
          if [ ! -d "android" ]; then
            npx react-native init TempApp --version 0.72.6 --skip-install
            mv TempApp/android .
            rm -rf TempApp
          fi

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease -x lint --no-daemon

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
            
