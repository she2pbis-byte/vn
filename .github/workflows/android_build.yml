on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare Project Structure
        run: |
          # Создаем все файлы в одном шаге, игнорируя ошибки
          echo '{"name": "vn", "version": "0.0.1", "private": true, "dependencies": {"react": "18.2.0", "react-native": "0.72.6"}}' > package.json || true
          echo '{"name": "vn", "displayName": "VN"}' > app.json || true
          echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js || true
          echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return (<View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>VN Project Started</Text></View>); }" > App.js || true

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps || true
          npm install -g react-native-cli || true

      - name: Generate Android Folder
        run: |
          # Пытаемся создать папку android с нуля
          npx react-native init TempApp --version 0.72.6 --skip-install --skip-git || true
          if [ -d "TempApp/android" ]; then
            cp -r TempApp/android . || true
            rm -rf TempApp || true
          fi

      - name: Build Android Release
        run: |
          # Проверяем, появилась ли папка. Если нет - создаем заглушку, чтобы не падать сразу
          mkdir -p android/app || true
          cd android
          # Генерируем wrapper
          gradle wrapper --gradle-version 8.0.1 || true
          chmod +x gradlew || true
          # Запуск сборки. Если упадет здесь - значит проблема в Java-коде
          ./gradlew assembleRelease -x lint -x test --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-files
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
