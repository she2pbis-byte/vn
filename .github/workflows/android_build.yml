on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Create Base Files
        run: |
          # Создаем файлы в корне, если их нет
          if [ ! -f "package.json" ]; then
            echo '{"name": "vn", "version": "0.0.1", "private": true, "dependencies": {"react": "18.2.0", "react-native": "0.72.6"}}' > package.json
          fi
          if [ ! -f "app.json" ]; then
            echo '{"name": "vn", "displayName": "VN"}' > app.json
          fi
          if [ ! -f "index.js" ]; then
            echo "import {AppRegistry} from 'react-native'; import App from './App'; import {name as appName} from './app.json'; AppRegistry.registerComponent(appName, () => App);" > index.js
          fi
          if [ ! -f "App.js" ]; then
            echo "import React from 'react'; import {View, Text} from 'react-native'; export default function App() { return (<View style={{flex:1, justifyContent:'center', alignItems:'center'}}><Text>VN App Ready</Text></View>); }" > App.js
          fi

      - name: Initialize Android
        run: |
          # Используем современный npx вместо глобального cli (исправляет ошибку со скрина 49878)
          npx --yes react-native@0.72.6 init TempApp --version 0.72.6 --skip-install --skip-git --directory . || true
          
      - name: Build Android Release
        run: |
          # Убеждаемся, что gradle существует
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x lint -x test

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-release
          path: android/app/build/outputs/apk/release/*.apk
