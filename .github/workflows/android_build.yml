on:
  push:
    branches: [ "main", "master", "patch-1" ]
  pull_request:
    branches: [ "main", "master", "patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install -g react-native-cli

      - name: Generate Android Folder
        run: |
          # Если папки нет, создаем проект с нуля
          if [ ! -d "android" ]; then
            npx react-native init TempApp --version 0.72.6 --skip-install
            mv TempApp/android .
            mv TempApp/app.json . || true
            rm -rf TempApp
          fi

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          # Игнорируем ошибки проверки (lint) и собираем APK
          ./gradlew assembleRelease -x lint -x test --no-daemon

      - name: Upload APK
        if: always() # Попытаться загрузить, даже если были ошибки
        uses: actions/upload-artifact@v4
        with:
          name: vn-app-debug-or-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
