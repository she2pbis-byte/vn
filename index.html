<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приложение с сохранением в Sheets</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #status { font-weight: bold; }
    </style>
</head>
<body>

    <h1>Мое приложение</h1>
    <p>Текущий статус: <span id="status">Ожидание изменений...</span></p>

    <script>
        async function saveHashToGoogleSheets() {
            // ВАЖНО: Вставьте сюда ваш URL от Sheet.best
            const sheetBestUrl = 'https://sheet.best/api/sheets/ВАШ_ID'; 
            const statusEl = document.getElementById('status');
            
            // Получаем данные из хэша
            const currentHash = window.location.hash.substring(1);
            
            if (!currentHash) {
                console.log("Хэш пуст, отправка отменена.");
                statusEl.innerText = "Хэш пуст";
                return;
            }

            statusEl.innerText = "Сохранение в таблицу...";
            statusEl.style.color = "blue";

            // Объект данных (убедитесь, что в таблице есть столбцы 'date' и 'hash')
            const payload = {
                date: new Date().toLocaleString('ru-RU'),
                hash: decodeURIComponent(currentHash)
            };

            try {
                const response = await fetch(sheetBestUrl, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusEl.innerText = "Данные успешно сохранены!";
                    statusEl.style.color = "green";
                } else {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }
            } catch (error) {
                statusEl.innerText = "Ошибка при сохранении";
                statusEl.style.color = "red";
                console.error('Ошибка:', error);
            }
        }

        // 1. Слушаем изменения хэша в реальном времени
        window.addEventListener('hashchange', saveHashToGoogleSheets);

        // 2. Проверяем хэш сразу при загрузке страницы
        window.addEventListener('load', () => {
            if (window.location.hash) {
                saveHashToGoogleSheets();
            }
        });
    </script>
</body>
</html>
